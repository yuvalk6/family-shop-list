<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover"/>
  <title>🛒 רשימת קניות</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <style>
    :root{
      --bg:#F2EDE3;--bg2:#E9E2D6;--card:#FFFEF9;--border:#DDD5C6;
      --text:#18130A;--muted:#7B7163;--light:#B8AFA0;
      --primary:#1C6043;--primary-l:#28855C;--primary-ll:#E6F4EC;
      --accent:#C4581F;--accent-ll:#FDF0E8;
      --success:#2E9960;--danger:#D04545;--danger-l:#FDEAEA;
      --s1:0 1px 3px rgba(0,0,0,.05),0 4px 14px rgba(0,0,0,.07);
      --s2:0 2px 10px rgba(0,0,0,.09),0 12px 36px rgba(0,0,0,.12);
      --r:18px;--r-sm:11px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;direction:rtl;-webkit-tap-highlight-color:transparent;}
    #app{height:100%;display:flex;flex-direction:column;overflow:hidden;}
    button{font-family:'Heebo',sans-serif;cursor:pointer;}

    /* ── LOADING ── */
    #loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:900;}
    #loading-screen.hidden{display:none;}
    .spinner{width:46px;height:46px;border:3.5px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .72s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* ── PROFILE SELECTOR SCREEN ── */
    #profile-select-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;z-index:800;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    #profile-select-screen.hidden{display:none;}
    .ps-hero{background:linear-gradient(135deg,#1C6043 0%,#28855C 100%);padding:40px 24px 30px;text-align:center;color:#fff;flex-shrink:0;}
    .ps-hero-icon{font-size:3rem;margin-bottom:10px;}
    .ps-hero-title{font-size:1.6rem;font-weight:900;letter-spacing:-.5px;margin-bottom:6px;}
    .ps-hero-sub{font-size:.88rem;opacity:.78;}
    .ps-body{padding:20px 16px;flex:1;}
    .ps-section-label{font-size:.75rem;font-weight:800;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px;padding-right:2px;}
    .ps-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
    .ps-card{background:var(--card);border-radius:var(--r);border:2px solid var(--border);box-shadow:var(--s1);padding:16px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .18s;-webkit-tap-highlight-color:transparent;}
    .ps-card:hover,.ps-card:active{box-shadow:var(--s2);transform:translateY(-1px);}
    .ps-card-icon{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0;}
    .ps-card-body{flex:1;min-width:0;}
    .ps-card-name{font-size:1.02rem;font-weight:800;letter-spacing:-.2px;}
    .ps-card-meta{font-size:.76rem;color:var(--muted);margin-top:3px;}
    .ps-card-arrow{font-size:1rem;color:var(--light);flex-shrink:0;}
    .ps-card-actions{display:flex;gap:6px;flex-shrink:0;}
    .ps-add-btn{background:var(--card);border-radius:var(--r);border:2px dashed var(--border);padding:18px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;color:var(--muted);font-size:.93rem;font-weight:700;font-family:'Heebo',sans-serif;width:100%;transition:all .18s;}
    .ps-add-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-ll);}

    /* ── HEADER ── */
    #app-header{height:54px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#1C6043 0%,#28855C 100%);box-shadow:0 2px 20px rgba(28,96,67,.4);flex-shrink:0;}
    .h-left{display:flex;align-items:center;gap:8px;}
    .h-back-btn{background:rgba(255,255,255,.18);border:none;border-radius:9px;color:#fff;font-size:.85rem;padding:5px 10px;cursor:pointer;font-family:'Heebo',sans-serif;font-weight:700;display:flex;align-items:center;gap:4px;transition:background .15s;}
    .h-back-btn:hover{background:rgba(255,255,255,.28);}
    .h-profile-badge{display:flex;align-items:center;gap:6px;}
    .h-profile-icon{font-size:1.2rem;}
    .h-title{font-size:1.05rem;font-weight:900;color:#fff;letter-spacing:-.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
    .h-right{display:flex;align-items:center;gap:8px;}
    .conn-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.14);border-radius:99px;padding:5px 10px;}
    .conn-dot{width:8px;height:8px;border-radius:50%;background:#5DE898;box-shadow:0 0 7px #5DE898;transition:all .3s;flex-shrink:0;}
    .conn-dot.offline{background:#FF7070;box-shadow:0 0 7px #FF7070;}
    .conn-dot.syncing{background:#FFD060;box-shadow:0 0 7px #FFD060;animation:blink .65s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
    .conn-label{font-size:.7rem;color:rgba(255,255,255,.82);font-weight:600;}
    .sync-btn{background:rgba(255,255,255,.14);border:none;border-radius:9px;color:rgba(255,255,255,.88);font-size:.78rem;padding:5px 9px;cursor:pointer;transition:background .18s;display:flex;align-items:center;gap:4px;font-family:'Heebo',sans-serif;font-weight:700;}
    .sync-btn:hover{background:rgba(255,255,255,.26);}

    /* ── BOTTOM NAV ── */
    #bottom-nav{height:66px;background:var(--card);border-top:1.5px solid var(--border);display:flex;box-shadow:0 -4px 24px rgba(0,0,0,.08);flex-shrink:0;}
    .nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;font-family:'Heebo',sans-serif;color:var(--light);transition:color .18s;position:relative;}
    .nav-tab .ni{font-size:1.25rem;transition:transform .2s;}
    .nav-tab .nl{font-size:.65rem;font-weight:700;}
    .nav-tab.active{color:var(--primary);}
    .nav-tab.active .ni{transform:scale(1.12);}
    .nav-tab.active::after{content:'';position:absolute;top:0;left:20%;right:20%;height:3px;background:var(--primary);border-radius:0 0 4px 4px;}
    .nav-badge{position:absolute;top:8px;right:calc(50% - 20px);min-width:17px;height:17px;background:var(--accent);color:#fff;border-radius:99px;font-size:.62rem;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 3px;}

    .screen{display:none;padding-bottom:16px;}
    .screen.active{display:block;}
    #screens-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;height:0;}

    /* ── BUTTONS ── */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--r-sm);font-family:'Heebo',sans-serif;font-weight:700;cursor:pointer;transition:all .16s;white-space:nowrap;}
    .btn-primary{background:var(--primary);color:#fff;padding:11px 22px;font-size:.9rem;box-shadow:0 3px 12px rgba(28,96,67,.32);}
    .btn-primary:hover{background:var(--primary-l);transform:translateY(-1px);}
    .btn-secondary{background:var(--bg2);color:var(--muted);border:1.5px solid var(--border);padding:8px 15px;font-size:.83rem;}
    .btn-secondary:hover{background:var(--border);color:var(--text);}
    .btn-ghost{background:transparent;color:var(--muted);padding:6px 10px;font-size:.83rem;}
    .btn-ghost:hover{background:var(--bg2);color:var(--text);}
    .btn-danger{background:var(--danger-l);color:var(--danger);border:1px solid #f0c0c0;padding:7px 14px;font-size:.83rem;}
    .btn-danger:hover{background:#fac8c8;}
    .btn-success{background:var(--primary-ll);color:var(--primary);border:1px solid #a8d8bc;padding:7px 14px;font-size:.83rem;}
    .btn-success:hover{background:#ceeadb;}
    .btn-icon{background:transparent;border:none;padding:6px 7px;border-radius:8px;color:var(--light);font-size:.95rem;transition:all .14s;}
    .btn-icon:hover{background:var(--bg2);color:var(--muted);}
    .btn-icon.del:hover{background:var(--danger-l);color:var(--danger);}
    .btn-xs{padding:5px 11px;font-size:.8rem;border-radius:8px;}
    .btn-sm{padding:7px 14px;font-size:.83rem;}
    .btn-lg{padding:13px 24px;font-size:1rem;width:100%;border-radius:var(--r-sm);}

    /* ── TOOLBAR ── */
    .manage-sticky{position:sticky;top:0;z-index:50;background:var(--card);box-shadow:0 2px 8px rgba(0,0,0,.06);}
    .toolbar{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;}
    .toolbar-search{display:flex;align-items:center;gap:6px;background:var(--bg);border:1.5px solid var(--border);border-radius:99px;padding:5px 10px;flex-shrink:1;min-width:80px;transition:border-color .2s;flex:1;}
    .toolbar-search:focus-within{border-color:var(--primary);background:#fff;}
    .search-icon{font-size:.85rem;flex-shrink:0;color:var(--light);}
    .search-inp{flex:1;border:none;background:transparent;font-family:'Heebo',sans-serif;font-size:.83rem;color:var(--text);outline:none;direction:rtl;min-width:0;}
    .search-inp::placeholder{color:var(--light);}
    .search-clear{background:transparent;border:none;color:var(--light);font-size:.78rem;cursor:pointer;padding:0;flex-shrink:0;}
    .search-clear:hover{color:var(--danger);}
    .search-highlight{background:#FFF3A3;border-radius:3px;padding:0 1px;}
    .check-wrap{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;}
    .check-box{width:19px;height:19px;border-radius:5px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .15s;background:#fff;flex-shrink:0;}
    .check-box:hover{border-color:var(--primary);}
    .check-box.checked{background:var(--primary);border-color:var(--primary);}
    .check-box.checked::after{content:'✓';color:#fff;font-size:.67rem;font-weight:900;}
    .check-box.partial{background:var(--primary);border-color:var(--primary);}
    .check-box.partial::after{content:'−';color:#fff;font-size:.82rem;font-weight:900;}

    /* ── CAT GRID ── */
    .cat-grid{padding:14px 14px 10px;display:flex;flex-direction:column;gap:13px;}
    @media(max-width:600px){.cat-grid{padding:10px 10px;gap:11px;}.toolbar-search{flex-basis:100%;max-width:none;}.toolbar .search-icon{font-size:.82rem;}}

    /* ── CAT CARD ── */
    .cat-card{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);box-shadow:var(--s1);overflow:hidden;transition:box-shadow .2s,transform .15s;}
    .cat-card:hover{box-shadow:var(--s2);}
    .cat-card.drag-over{box-shadow:0 0 0 2.5px var(--primary),var(--s2);transform:scale(1.005);}
    .cat-card.dragging{opacity:.4;transform:scale(.98);}
    .cat-header{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;user-select:none;position:relative;}
    .cat-header::before{content:'';position:absolute;right:0;top:0;bottom:0;width:4px;border-radius:0 4px 4px 0;background:var(--cat-color,var(--primary));}
    .drag-handle{color:var(--light);font-size:.9rem;cursor:grab;padding:2px 3px;flex-shrink:0;touch-action:none;user-select:none;}
    .drag-handle:active{cursor:grabbing;}
    .cat-icon-wrap{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.35rem;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.08);position:relative;}
    .cat-icon-edit{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.45);border-radius:12px;opacity:0;transition:opacity .15s;font-size:.75rem;color:#fff;font-weight:700;cursor:pointer;}
    .cat-icon-wrap:hover .cat-icon-edit{opacity:1;}
    .cat-name-wrap{flex:1;min-width:0;}
    .cat-name{font-size:1rem;font-weight:800;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cat-sub{font-size:.74rem;color:var(--muted);margin-top:1px;font-weight:500;}
    .cat-name-input{font-size:1rem;font-weight:800;color:var(--text);border:none;background:transparent;font-family:'Heebo',sans-serif;width:100%;outline:none;border-bottom:2px solid var(--primary);padding-bottom:1px;}
    .cat-badge{font-size:.72rem;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--bg);border:1px solid var(--border);color:var(--muted);flex-shrink:0;}
    .cat-badge.all-done{background:var(--primary-ll);color:var(--primary);border-color:#9ECFB3;}
    .toggle-icon{font-size:.8rem;color:var(--light);transition:transform .22s;flex-shrink:0;}
    .cat-card.collapsed .toggle-icon{transform:rotate(-90deg);}
    .cat-actions{display:flex;gap:1px;flex-shrink:0;}
    .items-list{border-top:1px solid var(--border);}
    .cat-card.collapsed .items-list{display:none;}

    /* ── ITEM ROW ── */
    .item-row{display:flex;align-items:flex-start;gap:9px;padding:10px 14px;border-bottom:1px solid #EDE8E0;transition:background .14s;position:relative;}
    .item-row:last-child{border-bottom:none;}
    .item-row:hover{background:#F8F4EE;}
    .item-row:hover .item-actions{opacity:1;}
    .item-row.dragging{opacity:.4;}
    .item-row.drag-over-top::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--primary);}
    .item-row.drag-over-bottom::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--primary);}
    .item-drag{color:var(--light);font-size:.82rem;cursor:grab;padding:3px;flex-shrink:0;margin-top:2px;touch-action:none;user-select:none;}
    .item-drag:active{cursor:grabbing;}
    .item-cb{width:22px;height:22px;border-radius:7px;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:#fff;margin-top:1px;}
    .item-cb:hover{border-color:var(--primary);background:var(--primary-ll);}
    .item-cb.checked{background:var(--primary);border-color:var(--primary);}
    .item-cb.checked::after{content:'✓';color:#fff;font-size:.75rem;font-weight:900;}
    .item-body{flex:1;min-width:0;}
    .item-name{font-size:.91rem;font-weight:500;color:var(--text);cursor:pointer;line-height:1.35;padding:1px 0;transition:color .15s;}
    .item-name:hover{color:var(--primary);}
    .item-name.checked-txt{color:var(--success);font-weight:700;}
    .item-name-input{font-size:.91rem;font-weight:500;color:var(--text);border:none;background:transparent;font-family:'Heebo',sans-serif;width:100%;outline:none;border-bottom:1.5px solid var(--primary);padding-bottom:1px;}
    .item-note-text{font-size:.76rem;color:var(--muted);margin-top:3px;font-style:italic;}
    .note-expand{margin-top:7px;width:100%;padding:7px 11px;border:1px solid var(--border);border-radius:9px;font-family:'Heebo',sans-serif;font-size:.83rem;color:var(--text);background:var(--bg);outline:none;resize:none;line-height:1.55;transition:border-color .2s;}
    .note-expand:focus{border-color:var(--primary);}
    .item-right{display:flex;align-items:center;gap:5px;flex-shrink:0;padding-top:1px;}
    .qty-select{border:1.5px solid #E2C9B6;border-radius:8px;padding:4px 7px;font-family:'Heebo',sans-serif;font-size:.82rem;color:var(--accent);background:var(--accent-ll);cursor:pointer;outline:none;font-weight:800;min-width:46px;text-align:center;}
    .item-actions{display:flex;gap:1px;opacity:0;transition:opacity .15s;}
    @media(max-width:600px){.item-actions{opacity:1;}}

    /* ── ADD ITEM / CAT ── */
    .add-item-bar{display:flex;align-items:center;gap:7px;padding:9px 14px;border-top:1.5px dashed var(--border);background:linear-gradient(to bottom,var(--bg2),var(--bg));}
    .add-item-input{flex:1;border:none;background:transparent;font-family:'Heebo',sans-serif;font-size:.9rem;color:var(--text);outline:none;}
    .add-item-input::placeholder{color:var(--light);}
    .add-cat-tile{background:var(--card);border-radius:var(--r);border:2px dashed var(--border);min-height:68px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .18s;color:var(--muted);font-size:.9rem;font-weight:700;}
    .add-cat-tile:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-ll);}
    .add-cat-form{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);padding:18px 16px;display:flex;flex-direction:column;gap:11px;box-shadow:var(--s1);}
    .add-cat-inp{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Heebo',sans-serif;font-size:.93rem;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s;}
    .add-cat-inp:focus{border-color:var(--primary);}
    .icon-picker-row{display:flex;gap:7px;flex-wrap:wrap;}
    .icon-opt{font-size:1.3rem;cursor:pointer;padding:5px 7px;border-radius:9px;transition:all .14s;border:2px solid transparent;}
    .icon-opt:hover{background:var(--bg2);}
    .icon-opt.selected{border-color:var(--primary);background:var(--primary-ll);}

    /* ── ICON PICKER POPUP ── */
    #icon-picker-overlay{position:fixed;inset:0;background:rgba(8,6,2,.55);display:flex;align-items:center;justify-content:center;z-index:1400;padding:20px;}
    #icon-picker-overlay.hidden{display:none;}
    .icon-picker-box{background:var(--card);border-radius:var(--r);padding:22px;max-width:340px;width:100%;box-shadow:var(--s2);}
    .icon-picker-box h4{font-size:.95rem;font-weight:800;color:var(--primary);margin-bottom:14px;}
    .icon-picker-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:14px;}
    .ip-opt{font-size:1.5rem;cursor:pointer;padding:8px;border-radius:10px;transition:all .14s;border:2px solid transparent;text-align:center;}
    .ip-opt:hover{background:var(--bg2);}
    .ip-opt.selected{border-color:var(--primary);background:var(--primary-ll);}

    /* ── EMPTY STATES ── */
    .empty-items{padding:16px;text-align:center;color:var(--light);font-size:.83rem;}
    .empty-cart{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 24px;text-align:center;gap:13px;}
    .empty-cart .ec-icon{font-size:3.8rem;}
    .empty-cart .ec-title{font-size:1.1rem;font-weight:800;}
    .empty-cart .ec-sub{font-size:.88rem;color:var(--muted);line-height:1.6;}

    /* ── CART SCREEN ── */
    .cart-header-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:12px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
    .cart-stats{font-size:.88rem;color:var(--muted);}
    .cart-stats strong{color:var(--text);font-size:.95rem;font-weight:800;}
    .cart-item-row{display:flex;align-items:flex-start;gap:9px;padding:10px 14px;border-bottom:1px solid #EDE8E0;transition:background .13s;}
    .cart-item-row:last-child{border-bottom:none;}
    .cart-item-row:hover{background:#F8F4EE;}
    .purchase-cb{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;background:#fff;margin-top:1px;}
    .purchase-cb:hover{border-color:var(--success);background:#E8F8EF;}
    .purchase-cb.done{background:var(--success);border-color:var(--success);}
    .purchase-cb.done::after{content:'✓';color:#fff;font-size:.75rem;font-weight:900;}
    .cart-item-name{flex:1;font-size:.9rem;font-weight:500;color:var(--text);line-height:1.4;}
    .cart-item-name.purchased{text-decoration:line-through;color:var(--light);}
    .cart-item-note{font-size:.76rem;color:var(--muted);font-style:italic;margin-top:2px;}
    .cart-item-qty{font-size:.76rem;color:var(--accent);background:var(--accent-ll);padding:2px 8px;border-radius:99px;font-weight:800;flex-shrink:0;}
    .cart-remove-btn{background:transparent;border:none;padding:4px 6px;border-radius:7px;color:var(--light);font-size:.85rem;cursor:pointer;transition:all .14s;flex-shrink:0;}
    .cart-remove-btn:hover{background:var(--danger-l);color:var(--danger);}

    /* ── LISTS SCREEN ── */
    .lists-toolbar{display:flex;align-items:center;gap:10px;padding:13px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
    .lists-toolbar h2{font-size:.95rem;font-weight:800;color:var(--text);flex:1;}
    .saved-list-card{background:var(--card);border-radius:var(--r);border:1.5px solid var(--border);box-shadow:var(--s1);padding:16px;display:flex;align-items:center;gap:12px;transition:box-shadow .18s;}
    .saved-list-card:hover{box-shadow:var(--s2);}

// ═══ SUPABASE ═══
async function connect(url,key){
  sb=supabase.createClient(url,key);
  const {error}=await sb.from('profiles').select('id').limit(1);
  if(error)throw error;
}

async function loadProfiles(){
  const {data,error}=await sb.from('profiles').select('*').order('created_at');
  if(error)throw error;
  profiles=data||[];
}

async function loadProfileData(profileId){
  const [{data:cats,error:e1},{data:itms,error:e2},{data:lists,error:e3}]=await Promise.all([
    sb.from('categories').select('*').eq('profile_id',profileId).order('order_idx'),
    sb.from('items').select('*').eq('profile_id',profileId).order('order_idx').order('created_at'),
    sb.from('shopping_lists').select('*').eq('profile_id',profileId).order('created_at',{ascending:false}),
  ]);
  if(e1)throw e1; if(e2)throw e2;
  categories=cats||[];
  items=itms||[];
  shoppingLists=e3?[]:(lists||[]);
}

async function seedProfileIfEmpty(profileId){
  // New profiles start empty - user builds their own list
}

let realtimeChannel=null;
function subscribeRealtime(profileId){
  if(realtimeChannel){sb.removeChannel(realtimeChannel);realtimeChannel=null;}
  realtimeChannel=sb.channel('rt-prof-'+profileId,{config:{broadcast:{self:false}}})
    .on('postgres_changes',{event:'*',schema:'public',table:'categories',filter:'profile_id=eq.'+profileId},()=>loadProfileData(profileId).then(render))
    .on('postgres_changes',{event:'*',schema:'public',table:'items',filter:'profile_id=eq.'+profileId},p=>{
      const {eventType:t,new:n,old:o}=p;
      if(t==='INSERT'){if(!items.find(i=>i.id===n.id))items.push(n);}
      else if(t==='UPDATE'){const idx=items.findIndex(x=>x.id===n.id);if(idx!==-1)items[idx]=n;else items.push(n);}
      else if(t==='DELETE'){items=items.filter(i=>i.id!==o.id);}
      render();
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'shopping_lists',filter:'profile_id=eq.'+profileId},()=>{
      sb.from('shopping_lists').select('*').eq('profile_id',profileId).order('created_at',{ascending:false})
        .then(({data})=>{shoppingLists=data||[];renderLists();});
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'profiles'},()=>{
      loadProfiles().then(renderProfileSelect);
    })
    .subscribe(s=>{
      const dot=document.getElementById('conn-dot'),lbl=document.getElementById('conn-label');
      if(s==='SUBSCRIBED'){dot.className='conn-dot';lbl.textContent='מחובר';}
      else if(s==='CLOSED'||s==='CHANNEL_ERROR'){dot.className='conn-dot offline';lbl.textContent='מנותק';setTimeout(()=>{if(sb&&activeProfile)subscribeRealtime(activeProfile.id);},3000);}
    });
}
function syncing(v){const dot=document.getElementById('conn-dot'),lbl=document.getElementById('conn-label');if(v){dot.className='conn-dot syncing';lbl.textContent='מסנכרן...';}else{dot.className='conn-dot';lbl.textContent='מחובר';}}

// ═══ PROFILE SELECT ═══
function renderProfileSelect(){
  const grid=document.getElementById('ps-grid');
  if(!profiles.length){
    grid.innerHTML=`<div style="text-align:center;padding:30px 20px;color:var(--muted);font-size:.9rem;line-height:1.7;">אין פרופילים עדיין<br>צור את הפרופיל הראשון 👇</div>`;
    return;
  }
  grid.innerHTML=profiles.map(p=>{
    const listCount=0; // we don't load all lists here
    return `<div class="ps-card" onclick="selectProfile('${p.id}')">
      <div class="ps-card-icon" style="background:${p.color}22;">${p.icon||'🛒'}</div>
      <div class="ps-card-body">
        <div class="ps-card-name" style="color:${p.color}">${escH(p.name)}</div>
        <div class="ps-card-meta">לחץ לפתיחה</div>
      </div>
      <div class="ps-card-actions" onclick="event.stopPropagation()">
        <button class="btn btn-secondary btn-xs" onclick="openProfileModal('edit',${JSON.stringify(p).replace(/"/g,'&quot;')})">✏️</button>
        <button class="btn btn-danger btn-xs" onclick="deleteProfile('${p.id}')">🗑</button>
      </div>
      <span class="ps-card-arrow">›</span>
    </div>`;
  }).join('');
}

async function selectProfile(id){
  const prof=profiles.find(p=>p.id===id);
  if(!prof)return;
  activeProfile=prof;
  showLoading(true);
  try{
    await loadProfileData(id);
    await seedProfileIfEmpty(id);
    subscribeRealtime(id);
    // Update header
    document.getElementById('header-prof-icon').textContent=prof.icon||'🛒';
    document.getElementById('header-prof-name').textContent=prof.name;
    // Show app
    document.getElementById('profile-select-screen').classList.add('hidden');
    document.getElementById('app').style.display='';
    switchScreen('manage');
    render();
  }catch(e){
    showToast('שגיאה בטעינת פרופיל: '+(e.message||''));
  }finally{
    showLoading(false);
  }
}

function goBackToProfiles(){
  // Save state, unsubscribe, go back
  if(realtimeChannel){sb.removeChannel(realtimeChannel);realtimeChannel=null;}
  activeProfile=null;
  categories=[];items=[];shoppingLists=[];
  collapsedCats.clear();expandedNotes.clear();
  searchQuery='';addingItemCat=null;editingItemId=null;editingCatId=null;addingCat=false;
  document.getElementById('app').style.display='none';
  document.getElementById('profile-select-screen').classList.remove('hidden');
  switchScreen('manage'); // reset tab for next time
}

  render();syncing(true);
  await sb.from('items').update({checked:val,purchased:false}).eq('id',id);
  syncing(false);
}

  syncing(false);
}

async function addItem(catId,name){
  name=name.trim();if(!name)return;
  const ci=items.filter(i=>i.category_id===catId);
  const mo=ci.reduce((m,x)=>Math.max(m,x.order_idx||0),0);
  const pid=activeProfile?.id;
  const tmp={id:'tmp-'+Date.now(),category_id:catId,name,quantity:1,checked:false,purchased:false,notes:null,order_idx:mo+1,profile_id:pid};
  items.push(tmp);addingItemCat=null;render();
  syncing(true);
  const {data,error}=await sb.from('items').insert({category_id:catId,name,quantity:1,order_idx:mo+1,profile_id:pid}).select().single();
  syncing(false);
  if(!error&&data){const i=items.findIndex(x=>x.id===tmp.id);if(i!==-1)items[i]=data;}
  else{items=items.filter(x=>x.id!==tmp.id);showToast('שגיאה בהוספה');}
  render();
}
async function deleteItem(id){
  items=items.filter(i=>i.id!==id);render();
  syncing(true);await sb.from('items').delete().eq('id',id);syncing(false);
  showToast('פריט נמחק');
}
async function addCategory(name,icon){
  name=name.trim();if(!name)return;
  const mo=categories.reduce((m,c)=>Math.max(m,c.order_idx||0),0);
  const pid=activeProfile?.id;
  const tmp={id:'tmp-cat-'+Date.now(),name,icon:icon||'📦',order_idx:mo+1,profile_id:pid};
  categories.push(tmp);addingCat=false;render();
  syncing(true);
  const {data,error}=await sb.from('categories').insert({name,icon:icon||'📦',order_idx:mo+1,profile_id:pid}).select().single();
  syncing(false);
  if(!error&&data){const i=categories.findIndex(c=>c.id===tmp.id);if(i!==-1)categories[i]=data;}
  else{categories=categories.filter(c=>c.id!==tmp.id);showToast('שגיאה בהוספה');}
  render();
}

async function autoSaveSession(){
  const checkedIds=items.filter(i=>i.checked).map(i=>i.id);
  if(!checkedIds.length||!activeProfile)return;
  try{
    const now=new Date();
    const dateStr=now.toLocaleDateString('he-IL',{day:'numeric',month:'numeric',year:'numeric'});
    const timeStr=now.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
    await sb.from('shopping_lists').delete().eq('profile_id',activeProfile.id).eq('is_auto',true);
    const {data}=await sb.from('shopping_lists').insert({
      name:`קנייה אחרונה — ${dateStr} ${timeStr}`,
      item_ids:checkedIds,is_auto:true,profile_id:activeProfile.id
    }).select().single();
    if(data){shoppingLists=shoppingLists.filter(l=>!l.is_auto);shoppingLists.unshift(data);renderLists();}
  }catch(e){}
}
async function saveShoppingList(name){
  name=name.trim();if(!name||!activeProfile)return;
  const checkedIds=items.filter(i=>i.checked).map(i=>i.id);
  if(!checkedIds.length)return showToast('אין פריטים מסומנים לשמירה');
  const dateStr=new Date().toLocaleDateString('he-IL',{day:'numeric',month:'numeric',year:'numeric'});
  const fullName=`${name} — ${dateStr}`;
  try{
    const {data,error}=await sb.from('shopping_lists').insert({name:fullName,item_ids:checkedIds,is_auto:false,profile_id:activeProfile.id}).select().single();
    if(error)throw error;
    if(data)shoppingLists.unshift(data);
    renderLists();showToast(`"${fullName}" נשמרה ✓`);
  }catch(e){showToast('שגיאה בשמירה');}
}
async function loadShoppingList(list){
  const ids=list.item_ids||[];
  items.forEach(i=>{i.checked=ids.includes(i.id);if(!ids.includes(i.id))i.purchased=false;});
  render();syncing(true);
  const pid=activeProfile?.id;
  await sb.from('items').update({checked:false,purchased:false}).eq('profile_id',pid);
  if(ids.length)await sb.from('items').update({checked:true}).in('id',ids);
  syncing(false);
  showToast(`"${list.name}" נטענה — ${ids.length} פריטים`);
  switchScreen('manage');
}
async function deleteShoppingList(id){
  confirmDlg('🗑️','מחיקת רשימה','הרשימה תימחק לצמיתות.',async()=>{
    try{

      shoppingLists=shoppingLists.filter(l=>l.id!==id);
      renderLists();showToast('רשימה נמחקה');
    }catch(e){showToast('שגיאה במחיקה');}
  });
}

  await Promise.all(ci.map((item,idx)=>sb.from('items').update({order_idx:idx}).eq('id',item.id)));

// ═══ PROFILES CRUD ═══
function openProfileModal(mode,prof){
  profModalMode=mode;profModalId=prof?prof.id:null;
  profIconSel=prof?prof.icon:PROF_ICONS[0];
  profColorSel=prof?prof.color:PROF_COLORS[0];
  document.getElementById('profile-modal-title').textContent=mode==='new'?'➕ פרופיל חדש':'✏️ עריכת פרופיל';
  document.getElementById('prof-name-inp').value=prof?prof.name:'';
  // Icon picker - profile icons
  document.getElementById('prof-icon-row').innerHTML=
    PROF_ICONS.map(ic=>`<span class="icon-opt ${ic===profIconSel?'selected':''}" style="font-size:1.5rem;" onclick="profIconSel='${ic}';document.querySelectorAll('#prof-icon-row .icon-opt').forEach(e=>e.classList.remove('selected'));this.classList.add('selected')">${ic}</span>`).join('');
  // Color picker
  document.getElementById('prof-color-row').innerHTML=
    PROF_COLORS.map(c=>`<div onclick="profColorSel='${c}';document.querySelectorAll('.prof-color-swatch').forEach(e=>e.style.outlineColor='transparent');this.style.outlineColor='${c}'" class="prof-color-swatch" style="background:${c};outline:3px solid ${c===profColorSel?c:'transparent'};outline-offset:2px;color:${c};"></div>`).join('');
  document.getElementById('profile-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('prof-name-inp').focus(),30);
}
async function saveProfile(){
  const name=document.getElementById('prof-name-inp').value.trim();
  if(!name)return showToast('יש להזין שם לפרופיל');
  const data={name,icon:profIconSel,color:profColorSel};
  try{
    if(profModalMode==='new'){
      const {data:r,error}=await sb.from('profiles').insert(data).select().single();
      if(error)throw error;
      profiles.push(r);
    }else{
      const {error}=await sb.from('profiles').update(data).eq('id',profModalId);
      if(error)throw error;
      const idx=profiles.findIndex(p=>p.id===profModalId);
      if(idx!==-1)profiles[idx]={...profiles[idx],...data};
      // Update header if this is the active profile
      if(activeProfile&&activeProfile.id===profModalId){
        activeProfile={...activeProfile,...data};
        document.getElementById('header-prof-icon').textContent=data.icon||'🛒';
        document.getElementById('header-prof-name').textContent=data.name;
      }
    }
    document.getElementById('profile-overlay').classList.add('hidden');
    renderProfileSelect();
    showToast(profModalMode==='new'?`פרופיל "${name}" נוצר ✓`:`פרופיל "${name}" עודכן ✓`);
  }catch(e){showToast('שגיאה: '+(e.message||''));}
}
async function deleteProfile(id){
  const prof=profiles.find(p=>p.id===id);
  confirmDlg('🗑️',`מחיקת פרופיל "${prof?.name}"`,'כל הקטגוריות, הפריטים והרשימות של הפרופיל יימחקו לצמיתות.',async()=>{
    try{
      await sb.from('profiles').delete().eq('id',id);
      profiles=profiles.filter(p=>p.id!==id);
      // if we deleted the active profile, go back
      if(activeProfile&&activeProfile.id===id)goBackToProfiles();
      else renderProfileSelect();
      showToast('פרופיל נמחק');
    }catch(e){showToast('שגיאה במחיקה');}
  });
}

// ═══ RENDER ═══
function p(idx){return PAL[idx%PAL.length];}
function render(){renderManage();renderCart();renderLists();updateGlobals();updateCollapseBtn('manage');updateCollapseBtn('cart');}

function updateGlobals(){
  const total=items.length,checked=items.filter(i=>i.checked).length;
  const pct=total?Math.round(checked/total*100):0;
  const ptEl=document.getElementById('prog-text');
  const ppEl=document.getElementById('prog-pct');
  if(ptEl)ptEl.textContent=`${checked}/${total}`;
  if(ppEl)ppEl.textContent=pct?`${pct}%`:'';
  const cb=document.getElementById('global-check-box');
  if(cb)cb.className=checked===0?'check-box':checked===total?'check-box checked':'check-box partial';
  const lbl=document.getElementById('select-all-label');
  if(lbl)lbl.textContent=checked===total&&total>0?'נקה הכל':'בחר הכל';
  const badge=document.getElementById('cart-badge');
  if(badge){if(checked>0){badge.style.display='';badge.textContent=checked;}else badge.style.display='none';}
  const cc=document.getElementById('cart-count');if(cc)cc.textContent=checked;
  const dc=document.getElementById('cart-done-count');if(dc)dc.textContent=items.filter(i=>i.purchased).length;
}

function renderManage(){
  const grid=document.getElementById('manage-grid');
  if(!grid)return;
  const q=searchQuery.toLowerCase();
  let html='';let totalVisible=0;
  categories.forEach((cat,ci)=>{
    let catItems=items.filter(i=>i.category_id===cat.id).sort((a,b)=>a.order_idx-b.order_idx);
    if(q)catItems=catItems.filter(i=>i.name.toLowerCase().includes(q));
    if(q&&catItems.length===0)return;
    totalVisible+=catItems.length;
    const done=catItems.filter(i=>i.checked).length;
    const allDone=catItems.length>0&&done===catItems.length;
    const allChk=catItems.length>0&&catItems.every(i=>i.checked);
    const someChk=catItems.some(i=>i.checked)&&!allChk;
    const pal=p(ci);
    const isCollapsed=collapsedCats.has(cat.id);
    const isEditing=editingCatId===cat.id;
    const isAdding=addingItemCat===cat.id;
    html+=`
    <div class="cat-card ${isCollapsed?'collapsed':''}" data-cat-id="${cat.id}"
      ondragover="onCatDragOver(event,'${cat.id}')"
      ondrop="onCatDrop(event,'${cat.id}')"
      ondragend="onDragEnd()">
      <div class="cat-header" onclick="toggleCollapse('${cat.id}')" style="--cat-color:${pal.c};">
        <div class="drag-handle" draggable="true"
          ondragstart="onCatDragStart(event,'${cat.id}')"
          onclick="event.stopPropagation()"
          ontouchstart="onCatTouchStart(event,'${cat.id}')"
          ontouchmove="onCatTouchMove(event)"
          ontouchend="onCatTouchEnd(event)">⠿</div>
        <div class="cat-icon-wrap" style="background:${pal.bg};" onclick="event.stopPropagation();openIconPicker('${cat.id}','${cat.icon||'📦'}')">
          <span>${cat.icon||'📦'}</span>
          <div class="cat-icon-edit">✏️</div>
        </div>
        <div class="cat-name-wrap">
          ${isEditing
            ?`<input class="cat-name-input" id="cat-inp-${cat.id}" value="${escH(cat.name)}" style="color:${pal.c}"
                onclick="event.stopPropagation()"
                onkeydown="if(event.key==='Enter')saveCatNameUI('${cat.id}');if(event.key==='Escape'){editingCatId=null;render();}"
                onblur="saveCatNameUI('${cat.id}')" />`
            :`<div class="cat-name" style="color:${pal.c}">${escH(cat.name)}</div>
               <div class="cat-sub">${catItems.length} פריטים</div>`}
        </div>
        <div class="cat-badge ${allDone?'all-done':''}">${done}/${catItems.length}</div>

        onkeydown="if(event.key==='Enter')commitAddCat();if(event.key==='Escape'){addingCat=false;render();}"/>

        <button class="btn btn-primary btn-sm" onclick="commitAddCat()" style="flex:1;justify-content:center;">✓ הוסף</button>
        <button class="btn btn-secondary btn-sm" onclick="addingCat=false;render()">ביטול</button>
      </div>
    </div>`;
  }else if(!q){
    html+=`<div class="add-cat-tile" onclick="addingCat=true;window._newCatIcon=null;render()"><span style="font-size:1.2rem">+</span> קטגוריה חדשה</div>`;
  }
  if(q&&totalVisible===0){

      ondragstart="onItemDragStart(event,'${item.id}','${item.category_id}')"
      onclick="event.stopPropagation()"

      ontouchmove="onItemTouchMove(event)"

      ${item.notes&&!noteExpanded?`<div class="item-note-text">📝 ${escH(item.notes)}</div>`:''}

    return;
  }
  let html='';
  categories.forEach((cat,catIdx)=>{
    const catItems=ci.filter(i=>i.category_id===cat.id).sort((a,b)=>a.order_idx-b.order_idx);
    if(!catItems.length)return;
    const pal=p(catIdx);
    const isCollapsed=collapsedCats.has('cart-'+cat.id);
    const purchased=catItems.filter(i=>i.purchased).length;
    html+=`<div class="cat-card ${isCollapsed?'collapsed':''}">
      <div class="cat-header" onclick="toggleCollapse('cart-${cat.id}')" style="--cat-color:${pal.c};">
        <div class="cat-icon-wrap" style="background:${pal.bg};"><span>${cat.icon||'📦'}</span></div>
        <div class="cat-name-wrap">
          <div class="cat-name" style="color:${pal.c}">${escH(cat.name)}</div>
          <div class="cat-sub">${catItems.length} פריטים</div>
        </div>

      </div>
      <div class="items-list">
        ${catItems.map(item=>`
        <div class="cart-item-row">
          <div class="purchase-cb ${item.purchased?'done':''}" onclick="toggleItemPurchased('${item.id}')"></div>
          <div style="flex:1;min-width:0;">
            <div class="cart-item-name ${item.purchased?'purchased':''}">${escH(item.name)}</div>
            ${item.notes?`<div class="cart-item-note">📝 ${escH(item.notes)}</div>`:''}

  else{tabs.style.display='none';title.textContent='📤 שיתוף רשימת קניות';document.getElementById('share-textarea').value=buildManageShareText();}
  document.getElementById('share-overlay').classList.remove('hidden');
}
function setShareTab(tab){
  shareTab=tab;
  ['all','done','miss'].forEach(t=>document.getElementById(`stab-${t}`)?.classList.toggle('active',t===tab));
  document.getElementById('share-textarea').value=buildCartShareText(tab);
}
function buildManageShareText(){
  const ci=items.filter(i=>i.checked);
  if(!ci.length)return '\u05d0\u05d9\u05df \u05e4\u05e8\u05d9\u05d8\u05d9\u05dd \u05e9\u05e0\u05d1\u05d7\u05e8\u05d5.';
  const today=new Date().toLocaleDateString('he-IL');
  let txt='\ud83d\uded2 '+(activeProfile?.name||'\u05e8\u05e9\u05d9\u05de\u05ea \u05e7\u05e0\u05d9\u05d5\u05ea')+' \u2014 '+today+'\n\n';
  categories.forEach(cat=>{
    const catItems=ci.filter(i=>i.category_id===cat.id).sort((a,b)=>a.order_idx-b.order_idx);
    if(!catItems.length)return;
    txt+=(cat.icon||'\ud83d\udce6')+' '+cat.name+':\n';
    catItems.forEach(item=>{
      txt+='  \u2022 '+item.name;
      if(item.quantity>1)txt+=' (\xd7'+item.quantity+')';
      if(item.notes)txt+=' \u2014 '+item.notes;
      txt+='\n';
    });
    txt+='\n';
  });
  return txt.trim();
}
function buildCartShareText(tab){
  const ci=items.filter(i=>i.checked);
  const today=new Date().toLocaleDateString('he-IL');
  let txt='\ud83d\uded2 \u05d3\u05d5\u05d7 \u05e7\u05e0\u05d9\u05d9\u05d4 \u2014 '+today+'\n\n';
  if(tab==='all'||tab==='done'){
    const done=ci.filter(i=>i.purchased);
    if(done.length){
      txt+='\u2705 \u05e0\u05e8\u05db\u05e9 ('+done.length+'):\n';
      categories.forEach(cat=>{
        const x=done.filter(i=>i.category_id===cat.id).sort((a,b)=>a.order_idx-b.order_idx);
        if(!x.length)return;
        txt+='  '+(cat.icon||'\ud83d\udce6')+' '+cat.name+':\n';
        x.forEach(i=>{txt+='    \u2022 '+i.name+(i.quantity>1?' (\xd7'+i.quantity+')':'')+'\n';});
      });
      txt+='\n';
    }
  }
  if(tab==='all'||tab==='miss'){
    const miss=ci.filter(i=>!i.purchased);
    if(miss.length){
      txt+='\u274c \u05d7\u05e1\u05e8 ('+miss.length+'):\n';
      categories.forEach(cat=>{
        const x=miss.filter(i=>i.category_id===cat.id).sort((a,b)=>a.order_idx-b.order_idx);
        if(!x.length)return;
        txt+='  '+(cat.icon||'\ud83d\udce6')+' '+cat.name+':\n';
        x.forEach(i=>{txt+='    \u2022 '+i.name+(i.quantity>1?' (\xd7'+i.quantity+')':'')+'\n';});
      });
    }
  }
  return txt.trim()||'\u05d0\u05d9\u05df \u05e0\u05ea\u05d5\u05e0\u05d9\u05dd';
}

// ═══ DRAG & DROP ═══
function onCatDragStart(e,id){dragCatSrc=id;e.dataTransfer.effectAllowed='move';setTimeout(()=>document.querySelector(`[data-cat-id="${id}"]`)?.classList.add('dragging'),0);}
function onCatDragOver(e,id){if(!dragCatSrc||dragCatSrc===id)return;e.preventDefault();document.querySelectorAll('.cat-card').forEach(el=>el.classList.remove('drag-over'));document.querySelector(`[data-cat-id="${id}"]`)?.classList.add('drag-over');}
function onCatDrop(e,tgtId){e.preventDefault();if(!dragCatSrc||dragCatSrc===tgtId)return onDragEnd();const si=categories.findIndex(c=>c.id===dragCatSrc),ti=categories.findIndex(c=>c.id===tgtId);if(si===-1||ti===-1)return onDragEnd();const [m]=categories.splice(si,1);categories.splice(ti,0,m);categories.forEach((c,i)=>c.order_idx=i);onDragEnd();render();reorderCategories();}
function onItemDragStart(e,id,catId){dragItemSrc=id;e.dataTransfer.effectAllowed='move';e.stopPropagation();setTimeout(()=>document.querySelector(`[data-item-id="${id}"]`)?.classList.add('dragging'),0);}
function onItemDragOver(e,id){if(!dragItemSrc||dragItemSrc===id)return;e.preventDefault();e.stopPropagation();document.querySelectorAll('.item-row').forEach(el=>el.classList.remove('drag-over-top','drag-over-bottom'));const rect=e.currentTarget.getBoundingClientRect();e.currentTarget.classList.add(e.clientY<rect.top+rect.height/2?'drag-over-top':'drag-over-bottom');}
function onItemDrop(e,tgtId,catId){e.preventDefault();e.stopPropagation();if(!dragItemSrc||dragItemSrc===tgtId)return onDragEnd();const isBefore=document.querySelector(`[data-item-id="${tgtId}"]`)?.classList.contains('drag-over-top');const si=items.findIndex(i=>i.id===dragItemSrc);const [m]=items.splice(si,1);const ti=items.findIndex(i=>i.id===tgtId);items.splice(isBefore?ti:ti+1,0,m);items.filter(i=>i.category_id===catId).forEach((item,i)=>{item.order_idx=i;});onDragEnd();render();reorderItems(catId);}
function onDragEnd(){dragCatSrc=null;dragItemSrc=null;document.querySelectorAll('.cat-card,.item-row').forEach(el=>el.classList.remove('dragging','drag-over','drag-over-top','drag-over-bottom'));}

// ═══ TOUCH DRAG ═══
function onCatTouchStart(e,id){if(e.touches.length>1)return;e.stopPropagation();touchDragType='cat';touchDragId=id;const card=document.querySelector('[data-cat-id="'+id+'"]');if(!card)return;card.classList.add('dragging');touchClone=card.cloneNode(true);touchClone.style.cssText='position:fixed;z-index:9999;opacity:.85;pointer-events:none;width:'+card.offsetWidth+'px;box-shadow:0 8px 30px rgba(0,0,0,.2);border-radius:14px;left:0;top:0;';document.body.appendChild(touchClone);const t=e.touches[0];touchClone.style.top=(t.clientY-20)+'px';touchClone.style.left=(t.clientX-touchClone.offsetWidth/2)+'px';}
function onCatTouchMove(e){if(touchDragType!=='cat')return;e.preventDefault();const t=e.touches[0];if(touchClone){touchClone.style.top=(t.clientY-20)+'px';touchClone.style.left=(t.clientX-touchClone.offsetWidth/2)+'px';}if(touchClone)touchClone.style.display='none';const el=document.elementFromPoint(t.clientX,t.clientY);if(touchClone)touchClone.style.display='';const tgt=el?.closest('[data-cat-id]');document.querySelectorAll('.cat-card').forEach(c=>c.classList.remove('drag-over'));if(tgt&&tgt.dataset.catId!==touchDragId)tgt.classList.add('drag-over');}
function onCatTouchEnd(e){if(touchDragType!=='cat')return;if(touchClone){touchClone.remove();touchClone=null;}const t=e.changedTouches[0];const el=document.elementFromPoint(t.clientX,t.clientY);const tgt=el?.closest('[data-cat-id]');if(tgt&&tgt.dataset.catId!==touchDragId){const si=categories.findIndex(c=>c.id===touchDragId);const ti=categories.findIndex(c=>c.id===tgt.dataset.catId);if(si!==-1&&ti!==-1){const [m]=categories.splice(si,1);categories.splice(ti,0,m);categories.forEach((c,i)=>c.order_idx=i);reorderCategories();}}document.querySelectorAll('.cat-card').forEach(c=>c.classList.remove('dragging','drag-over'));touchDragType=null;touchDragId=null;render();}
function onItemTouchStart(e,id,catId){if(e.touches.length>1)return;e.stopPropagation();touchDragType='item';touchDragId=id;touchDragCatId=catId;const row=document.querySelector('[data-item-id="'+id+'"]');if(!row)return;row.classList.add('dragging');touchClone=row.cloneNode(true);touchClone.style.cssText='position:fixed;z-index:9999;opacity:.85;pointer-events:none;width:'+row.offsetWidth+'px;box-shadow:0 6px 20px rgba(0,0,0,.18);border-radius:10px;background:#fff;left:0;top:0;';document.body.appendChild(touchClone);const t=e.touches[0];touchClone.style.top=(t.clientY-15)+'px';touchClone.style.left=(t.clientX-touchClone.offsetWidth/2)+'px';}
function onItemTouchMove(e){if(touchDragType!=='item')return;e.preventDefault();const t=e.touches[0];if(touchClone){touchClone.style.top=(t.clientY-15)+'px';touchClone.style.left=(t.clientX-touchClone.offsetWidth/2)+'px';}if(touchClone)touchClone.style.display='none';const el=document.elementFromPoint(t.clientX,t.clientY);if(touchClone)touchClone.style.display='';const tgt=el?.closest('[data-item-id]');document.querySelectorAll('.item-row').forEach(r=>r.classList.remove('drag-over-top','drag-over-bottom'));if(tgt&&tgt.dataset.itemId!==touchDragId){const rect=tgt.getBoundingClientRect();tgt.classList.add(t.clientY<rect.top+rect.height/2?'drag-over-top':'drag-over-bottom');}}
function onItemTouchEnd(e){if(touchDragType!=='item')return;if(touchClone){touchClone.remove();touchClone=null;}const t=e.changedTouches[0];if(touchClone)touchClone.style.display='none';const el=document.elementFromPoint(t.clientX,t.clientY);if(touchClone)touchClone.style.display='';const tgt=el?.closest('[data-item-id]');if(tgt&&tgt.dataset.itemId!==touchDragId){const isBefore=tgt.classList.contains('drag-over-top');const si=items.findIndex(i=>i.id===touchDragId);const [m]=items.splice(si,1);const ti=items.findIndex(i=>i.id===tgt.dataset.itemId);items.splice(isBefore?ti:ti+1,0,m);items.filter(i=>i.category_id===touchDragCatId).forEach((item,idx)=>{item.order_idx=idx;});reorderItems(touchDragCatId);}document.querySelectorAll('.item-row').forEach(r=>r.classList.remove('dragging','drag-over-top','drag-over-bottom'));touchDragType=null;touchDragId=null;touchDragCatId=null;render();}

// ═══ UI HELPERS ═══
function toggleCollapseAll(screen){
  const ids=screen==='manage'?categories.map(c=>c.id):categories.filter(c=>items.some(i=>i.category_id===c.id&&i.checked)).map(c=>'cart-'+c.id);
  const allCollapsed=ids.length>0&&ids.every(id=>collapsedCats.has(id));
  ids.forEach(id=>allCollapsed?collapsedCats.delete(id):collapsedCats.add(id));
  updateCollapseBtn(screen);render();
}
function updateCollapseBtn(screen){
  if(screen==='manage'){const ids=categories.map(c=>c.id);const allC=ids.length>0&&ids.every(id=>collapsedCats.has(id));const btn=document.getElementById('btn-collapse-toggle');if(btn)btn.textContent=allC?'⊕ הרחב הכל':'⊖ כווץ הכל';}
  else{const ids=categories.filter(c=>items.some(i=>i.category_id===c.id&&i.checked)).map(c=>'cart-'+c.id);const allC=ids.length>0&&ids.every(id=>collapsedCats.has(id));const btn=document.getElementById('btn-cart-collapse-toggle');if(btn)btn.textContent=allC?'⊕ הרחב הכל':'⊖ כווץ הכל';}
}
function toggleCollapse(id){collapsedCats.has(id)?collapsedCats.delete(id):collapsedCats.add(id);render();}
function startAddItem(catId){addingItemCat=catId;render();setTimeout(()=>document.getElementById(`add-inp-${catId}`)?.focus(),40);}
function commitAddItem(catId){const i=document.getElementById(`add-inp-${catId}`);if(i)addItem(catId,i.value);}
function commitAddCat(){const i=document.getElementById('new-cat-inp');if(i)addCategory(i.value,window._newCatIcon);}
function saveCatNameUI(id){const i=document.getElementById(`cat-inp-${id}`);if(i&&editingCatId===id)saveCatName(id,i.value);}
function saveItemNameUI(id){const i=document.getElementById(`item-inp-${id}`);if(i&&editingItemId===id)saveItemName(id,i.value);}
function saveNoteUI(id){const t=document.getElementById(`note-ta-${id}`);if(t)saveItemNote(id,t.value);}
function toggleNote(id){if(expandedNotes.has(id)){saveNoteUI(id);return;}expandedNotes.add(id);render();setTimeout(()=>document.getElementById(`note-ta-${id}`)?.focus(),30);}
function switchScreen(name){
  ['manage','cart','lists'].forEach(s=>{
    document.getElementById(`screen-${s}`)?.classList.toggle('active',s===name);
    document.getElementById(`tab-${s}`)?.classList.toggle('active',s===name);
  });
}
function showLoading(v){document.getElementById('loading-screen').classList.toggle('hidden',!v);}
function escH(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ═══ SAVE LIST MODAL ═══
function openSaveListModal(){
  const ci=items.filter(i=>i.checked);
  if(!ci.length)return showToast('אין פריטים מסומנים לשמירה');
  document.getElementById('save-list-name').value='';
  document.getElementById('save-list-overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('save-list-name').focus(),30);
}
document.getElementById('btn-save-list-ok').onclick=()=>{const name=document.getElementById('save-list-name').value;saveShoppingList(name);document.getElementById('save-list-overlay').classList.add('hidden');};
document.getElementById('btn-save-list-cancel').onclick=()=>document.getElementById('save-list-overlay').classList.add('hidden');
document.getElementById('save-list-name').addEventListener('keydown',e=>{if(e.key==='Enter'){const name=e.target.value;saveShoppingList(name);document.getElementById('save-list-overlay').classList.add('hidden');}if(e.key==='Escape')document.getElementById('save-list-overlay').classList.add('hidden');});

// ═══ TOAST & CONFIRM ═══
let toastTmr;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTmr);toastTmr=setTimeout(()=>el.classList.remove('show'),2700);}
function confirmDlg(icon,title,msg,cb){document.getElementById('conf-icon').textContent=icon;document.getElementById('conf-title').textContent=title;document.getElementById('conf-msg').textContent=msg;document.getElementById('confirm-overlay').classList.remove('hidden');confirmCb=cb;}
document.getElementById('btn-conf-ok').onclick=()=>{document.getElementById('confirm-overlay').classList.add('hidden');if(confirmCb){confirmCb();confirmCb=null;}};
document.getElementById('btn-conf-cancel').onclick=()=>{document.getElementById('confirm-overlay').classList.add('hidden');confirmCb=null;};

// ═══ WIRE UP ═══
document.getElementById('btn-share-manage').onclick=()=>openShare('manage');
document.getElementById('btn-share-cart').onclick=()=>openShare('cart');
document.getElementById('btn-copy-share').onclick=()=>{const ta=document.getElementById('share-textarea');navigator.clipboard.writeText(ta.value).then(()=>showToast('הועתק! 📋')).catch(()=>{ta.select();document.execCommand('copy');showToast('הועתק! 📋');});};
document.getElementById('btn-close-share').onclick=()=>document.getElementById('share-overlay').classList.add('hidden');
document.getElementById('btn-uncheck-all').onclick=uncheckAll;
document.getElementById('btn-clear-purchased').onclick=clearPurchased;
document.getElementById('btn-remove-from-cart').onclick=removeAllFromCart;
document.getElementById('btn-save-shopping').onclick=openSaveListModal;
document.getElementById('btn-new-save').onclick=openSaveListModal;
document.getElementById('btn-prof-save').onclick=saveProfile;
document.getElementById('btn-prof-cancel').onclick=()=>document.getElementById('profile-overlay').classList.add('hidden');
document.getElementById('prof-name-inp').addEventListener('keydown',e=>{if(e.key==='Enter')saveProfile();if(e.key==='Escape')document.getElementById('profile-overlay').classList.add('hidden');});
document.getElementById('btn-settings').onclick=()=>confirmDlg('🔄','רענון נתונים','לטעון מחדש מהשרת?',()=>loadProfileData(activeProfile?.id).then(render).then(()=>showToast('הנתונים עודכנו ✓')));

// ═══ STARTUP ═══
async function startup(){
  try{
    showLoading(true);
    await connect(SB_URL,SB_KEY);
    await loadProfiles();
    showLoading(false);
    // Always show profile select first
    renderProfileSelect();
  }catch(err){
    showLoading(false);
    alert('שגיאה בהתחברות: '+(err.message||'בדוק חיבור לאינטרנט'));
  }
}
startup();
</script>
